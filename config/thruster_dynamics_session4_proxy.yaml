# Session 4 forward-response proxy, not a healthy-thruster calibration.
# The forward scale matches the RC-clear 2026-07-08 12:58 navigation bag near
# cmd_drive=0.30 when used with the current-shaped actuator proxy. That bag's
# negative /cmd_drive interval produced no measured current and is therefore a
# command-to-current fault observation, not reverse-plant identification.
# Reverse force uses the reviewed Clearpath 25/45 reverse/forward design ratio
# only as a labelled sensitivity assumption; the electrical shape comes from
# the separate controlled direct-drive proxy.
rate: 30.0
cmd_timeout: 0.35
max_fwd_thrust: 3.22
max_bck_thrust: 1.79
forward_current_scale: 1.0
reverse_current_scale: 1.0
left_scale: 1.0
right_scale: 1.0
response_time_constant_sec: 0.45
max_drive_delta_per_sec: 1.25
