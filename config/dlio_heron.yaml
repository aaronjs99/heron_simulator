###########################################################
# DLIO Configuration for Heron USV Simulation
#
# Shared frame IDs and rigid extrinsics live in:
#   slam_grande/config/dlio_heron_geometry.yaml
###########################################################

dlio:

  version: 1.1.1

  adaptive: false

  odom:
    odom_frame: "odom"
    child_frame: "base_link"
    gravity: 9.80665
    preprocessing:
      cropBoxFilter:
        size: 0.25
      voxelFilter:
        res: 0.05
    # GICP parameters
    gicp:
      minNumPoints: 5
      maxIterations: 12
      kCorrespondences: 4
      maxCorrespondenceDistance: 2.0

    # Override IMU calibration to skip startup delay
    imu:
      calibration:
        time: 0.01

  pointcloud:
    deskew: false
    voxelize: false

  imu:
    calibration: false # Disable for sim
    intrinsics:
      accel:
        bias: [ 0.0, 0.0, 0.0 ]
        sm:   [ 1.,  0.,  0.,
            0.,  1.,  0.,
            0.,  0.,  1. ]
        noise: 0.005  # derived from sqrt(2.5e-05)
      gyro:
        bias: [ 0.0, 0.0, 0.0 ]
        noise: 0.005  # derived from sqrt(2.5e-05)

  map:
    sparse:
      leafSize: 0.25
    publish_map_tf: true
    waitUntilMove: false
