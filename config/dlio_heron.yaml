###########################################################
# DLIO Configuration for Heron USV Simulation
#
# Shared frame IDs and rigid extrinsics live in:
#   mariner/config/dlio.yaml
###########################################################

dlio:

  version: 1.1.1

  adaptive: false

  odom:
    odom_frame: "odom"
    gravity: 9.80665
    preprocessing:
      cropBoxFilter:
        size: 0.25
      voxelFilter:
        res: 0.05
    # GICP parameters
    gicp:
      minNumPoints: 16
      maxIterations: 12
      kCorrespondences: 4
      maxCorrespondenceDistance: 2.0

    # The default DLIO params.yaml keys too sparsely in Heron pool sim. Keep the
    # package-recommended sim threshold so translation creates keyframes before
    # the local submap becomes stale.
    keyframe:
      threshD: 0.1

    # Keep a short gravity/bias alignment even in sim. Starting DLiO with no
    # IMU calibration lets small hector IMU bias/noise integrate directly into
    # the surface-vehicle state before LiDAR registration can correct it.
    imu:
      calibration:
        time: 1.0

  pointcloud:
    deskew: false
    voxelize: false

  imu:
    calibration: true
    intrinsics:
      accel:
        bias: [ 0.0, 0.0, 0.0 ]
        sm:   [ 1.,  0.,  0.,
            0.,  1.,  0.,
            0.,  0.,  1. ]
        noise: 0.005  # derived from sqrt(2.5e-05)
      gyro:
        bias: [ 0.0, 0.0, 0.0 ]
        noise: 0.005  # derived from sqrt(2.5e-05)

  map:
    sparse:
      leafSize: 0.25
    publish_map_tf: true
    waitUntilMove: false
