    extent: [8.0, 4.0, 0.5]
    nav_standoff_default: 2.0
    inspect_standoff_default: 2.0
    temp_gate: {decay_rate: 0.0005}
    children:
      - "dock_pillar_west_north"
      - "dock_pillar_west_south"
      - "dock_pillar_mid_north"
      - "dock_pillar_mid_south"
