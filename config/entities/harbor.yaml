  # ----------------------------------------------------------------------------
  # LAUNCH DOCK
  # ----------------------------------------------------------------------------
  - id: "dock_main_platform"
    class: "DOCK"
    zone: "DOCK"
    aliases: ["dock", "main dock", "launch dock", "jetty"]
    affordances: ["NAV", "INSPECT"]
    risk: "LOW"
