# ==============================================================================
# SLAM GRANDE Environment Configuration: harbor.yaml
# Project: ORACLE
# Description:
#   Port-style simulated harbor used by Gazebo and ORACLE. Broad light-grey
#   concrete aprons frame pile-supported wharf edges, a diagonal quay, a clear
#   launch apron/gangway/floating dock path, uneven seafloor patches, and sparse
#   underwater debris for inspection and sonar tasks.
# ==============================================================================

# ==============================================================================
# 0. HEADER & METADATA
# ==============================================================================
schema_version: 2
frame: "map"
units: {pos: "m", angles: "rad"}
return_entity_id: "home"

# ==============================================================================
# 1. ZONES & REGIONS
# ==============================================================================
zones:
  - id: "DOCK"
    description: "Main harbor apron, shoreline, and launch dock"
    bounds: {x_min: -22.5, x_max: 71.5, y_min: -52, y_max: 32}
    priority: 10
    pad_m: 2.0

  - id: "OCEAN"
    description: "Open water area for navigation and targets"
    bounds: {x_min: 3.5, x_max: 63.5, y_min: -72, y_max: 56}
    priority: 1
    pad_m: 0.0

  - id: "BOUNDARY"
    description: "Western shoreline and environment limits"
    bounds: {x_min: -22.5, x_max: -4.5, y_min: -108, y_max: 92}
    priority: 0
    pad_m: 0.0

# ==============================================================================
# 2. TEMPLATES
# ==============================================================================
templates:
  materials:
    concrete: &mat_concrete
      ambient: [0.72, 0.72, 0.72, 1.0]
      diffuse: [0.82, 0.82, 0.82, 1.0]

    mud: &mat_mud
      ambient: [0.22, 0.18, 0.12, 1.0]
      diffuse: [0.32, 0.26, 0.18, 1.0]

    sand: &mat_sand
      ambient: [0.45, 0.40, 0.30, 1.0]
      diffuse: [0.58, 0.52, 0.38, 1.0]

    rock: &mat_rock
      ambient: [0.28, 0.28, 0.30, 1.0]
      diffuse: [0.38, 0.38, 0.40, 1.0]

    wood_dark: &mat_wood_dark
      ambient: [0.25, 0.25, 0.25, 1.0]
      diffuse: [0.35, 0.35, 0.35, 1.0]

    steel_yel: &mat_steel_yel
      ambient: [0.70, 0.70, 0.20, 1.0]
      diffuse: [0.90, 0.90, 0.30, 1.0]

    boat_blue: &mat_boat_blue
      ambient: [0.10, 0.20, 0.45, 1.0]
      diffuse: [0.15, 0.30, 0.65, 1.0]

    boat_white: &mat_boat_white
      ambient: [0.75, 0.75, 0.78, 1.0]
      diffuse: [0.90, 0.90, 0.95, 1.0]

  sim_configs:
    piling: &sim_piling
      geometry: "cylinder"
      visual:
        radius: 0.30
        length: 8.0
        material: *mat_wood_dark
      collision:
        radius: 0.30
        length: 8.0

    dock_pillar: &sim_dock_pillar
      geometry: "cylinder"
      visual:
        radius: 0.40
        length: 5.0
        material: *mat_wood_dark
      collision:
        radius: 0.40
        length: 5.0

    wharf_pile: &sim_wharf_pile
      geometry: "cylinder"
      visual:
        radius: 0.32
        length: 7.2
        material: *mat_wood_dark
      collision:
        radius: 0.32
        length: 7.2

    launch_pile: &sim_launch_pile
      geometry: "cylinder"
      visual:
        radius: 0.25
        length: 6.3
        material: *mat_wood_dark
      collision:
        radius: 0.25
        length: 6.3

  inspect_configs:
    piling: &inspect_piling
      viewpoint_gen:
        type: "RING"
        standoff: 1.8
        num_angles: 3
        height_slices: 2

    deck_transect: &inspect_deck_transect
      viewpoint_gen:
        type: "TRANSECT"
        offsets: [-1.2, 1.2]
        spacing: 6.0
        standoff: 2.0

# ==============================================================================
# 3. ENTITIES
# ==============================================================================
entities:
  # ----------------------------------------------------------------------------
  # HOME / RETURN
  # ----------------------------------------------------------------------------
  - id: "home"
    class: "HOME"
    zone: "DOCK"
    aliases: ["start", "base", "launch"]
    affordances: ["NAV", "RETURN"]
    description: "Robot home/start position just off the launch dock tip"
    pose:
      position: {x: 0, y: 0, z: 0.2}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
    radius: 2.0
    temp_gate: {decay_rate: 0.001}

