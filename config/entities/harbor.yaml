# ==============================================================================
# SLAM GRANDE Environment Configuration: harbor.yaml
# Project: ORACLE
# Description:
#   Port-style simulated harbor used by Gazebo. The launch dock is short,
#   the north and south inspection piers are long and straight, the east pier is
#   L-shaped, and a few moored boats provide visual context without blocking
#   navigation.
# ==============================================================================

# ==============================================================================
# 0. HEADER & METADATA
# ==============================================================================
schema_version: 2
frame: "map"
units: {pos: "m", angles: "rad"}
return_entity_id: "home"

# ==============================================================================
# 1. ZONES & REGIONS
# ==============================================================================
zones:
  - id: "DOCK"
    description: "Main harbor apron, shoreline, and launch dock"
    bounds: {x_min: -46.0, x_max: 48.0, y_min: -44.0, y_max: 40.0}
    priority: 10
    pad_m: 2.0

  - id: "NORTH_PIER"
    description: "Long north inspection pier"
    bounds: {x_min: -6.0, x_max: 28.0, y_min: 20.0, y_max: 28.0}
    priority: 10
    pad_m: 2.0

  - id: "SOUTH_PIER"
    description: "Long south inspection pier"
    bounds: {x_min: -8.0, x_max: 26.0, y_min: -22.0, y_max: -14.0}
    priority: 10
    pad_m: 2.0

  - id: "FAR_PIER"
    description: "Right-side L-shaped inspection pier"
    bounds: {x_min: -4.0, x_max: 36.0, y_min: 6.0, y_max: 28.0}
    priority: 10
    pad_m: 2.0

  - id: "OCEAN"
    description: "Open water area for navigation and targets"
    bounds: {x_min: -20.0, x_max: 40.0, y_min: -64.0, y_max: 64.0}
    priority: 1
    pad_m: 0.0

  - id: "BOUNDARY"
    description: "Western shoreline and environment limits"
    bounds: {x_min: -46.0, x_max: -28.0, y_min: -100.0, y_max: 100.0}
    priority: 0
    pad_m: 0.0

# ==============================================================================
# 2. TEMPLATES
# ==============================================================================
templates:
  materials:
    concrete: &mat_concrete
      ambient: [0.50, 0.50, 0.55, 1.0]
      diffuse: [0.60, 0.60, 0.65, 1.0]

    wood_dark: &mat_wood_dark
      ambient: [0.25, 0.25, 0.25, 1.0]
      diffuse: [0.35, 0.35, 0.35, 1.0]

    wood_deck: &mat_wood_deck
      ambient: [0.50, 0.35, 0.20, 1.0]
      diffuse: [0.60, 0.45, 0.25, 1.0]

    steel_yel: &mat_steel_yel
      ambient: [0.70, 0.70, 0.20, 1.0]
      diffuse: [0.90, 0.90, 0.30, 1.0]

    boat_blue: &mat_boat_blue
      ambient: [0.10, 0.20, 0.45, 1.0]
      diffuse: [0.15, 0.30, 0.65, 1.0]

    boat_white: &mat_boat_white
      ambient: [0.75, 0.75, 0.78, 1.0]
      diffuse: [0.90, 0.90, 0.95, 1.0]

  sim_configs:
    piling: &sim_piling
      geometry: "cylinder"
      visual:
        radius: 0.30
        length: 8.0
        material: *mat_wood_dark
      collision:
        radius: 0.30
        length: 8.0

    dock_pillar: &sim_dock_pillar
      geometry: "cylinder"
      visual:
        radius: 0.40
        length: 5.0
        material: *mat_wood_dark
      collision:
        radius: 0.40
        length: 5.0

  inspect_configs:
    piling: &inspect_piling
      viewpoint_gen:
        type: "RING"
        standoff: 1.8
        num_angles: 3
        height_slices: 2

    deck_transect: &inspect_deck_transect
      viewpoint_gen:
        type: "TRANSECT"
        offsets: [-1.2, 1.2]
        spacing: 6.0
        standoff: 2.0

# ==============================================================================
# 3. ENTITIES
# ==============================================================================
entities:
  # ----------------------------------------------------------------------------
  # HOME / RETURN
  # ----------------------------------------------------------------------------
  - id: "home"
    class: "HOME"
    zone: "DOCK"
    aliases: ["start", "base", "launch"]
    affordances: ["NAV", "RETURN"]
    description: "Robot home/start position just off the launch dock tip"
    pose:
      position: {x: -24.0, y: 10.0, z: 0.2}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
    radius: 2.0
    temp_gate: {decay_rate: 0.001}

  # ----------------------------------------------------------------------------
  # LAND / SHORELINE
  # ----------------------------------------------------------------------------
  - id: "wall_south_boundary"
    class: "WALL"
    zone: "BOUNDARY"
    aliases: ["west shoreline", "boundary"]
    affordances: ["AVOID"]
    description: "Western shoreline retaining wall"
    pose:
      position: {x: -40.0, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
    extent: [12.0, 112.0, 1.5]
    temp_gate: {decay_rate: 0.0001}
    sim:
      geometry: "box"
      visual:
        size: [12.0, 112.0, 1.5]
        material: *mat_concrete
      collision:
        size: [12.0, 112.0, 1.5]

  - id: "harbor_northwest_terminal"
    class: "WHARF"
    zone: "DOCK"
    aliases: ["northwest terminal", "north quay"]
    affordances: ["AVOID"]
    description: "Northwest terminal pad feeding the long north pier"
    pose:
      position: {x: -20.0, y: 30.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
    extent: [28.0, 20.0, 1.5]
    temp_gate: {decay_rate: 0.0002}
    sim:
