# Benchmark simulation thruster profile used by drive_to_thrusters.py.
# Keep this file limited to parameters the active translator reads.
rate: 30.0
cmd_timeout: 0.35
max_fwd_thrust: 45.0
max_bck_thrust: 25.0
forward_current_scale: 1.0
reverse_current_scale: 1.0
# Initial real-run correction: Friday bags showed asymmetric current/yaw and
# residual yaw during coast, while the old sim was perfectly symmetric.
left_scale: 0.92
right_scale: 1.0
response_time_constant_sec: 0.45
max_drive_delta_per_sec: 1.25
